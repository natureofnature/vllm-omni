# Stage 0: Thinker (multimodal understanding + text generation)
# RDMA/transfer-engine variant of the current Bagel pipeline config.

stage_args:
  - stage_id: 0
    stage_type: llm
    prompt_expand_func: vllm_omni.model_executor.stage_input_processors.bagel.expand_cfg_prompts
    runtime:
      devices: "0"
      # 3 = 1 user prompt + 2 CFG companions (text-unconditional + image-unconditional).
      max_batch_size: 3
    engine_args:
      model_stage: thinker
      model_arch: OmniBagelForConditionalGeneration
      worker_type: ar
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.45
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: text
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      tensor_parallel_size: 1
      omni_kv_config:
        need_send_cache: true
        kv_transfer_criteria:
          type: prefill_finished
    final_output: true
    final_output_type: text
    is_comprehension: true
    default_sampling_params:
      temperature: 0.4
      top_p: 0.9
      top_k: 1
      max_tokens: 2048
      seed: 52
      detokenize: True
      repetition_penalty: 1.05
    output_connectors:
      to_stage_1: rdma_connector

  - stage_id: 1
    stage_type: diffusion
    cfg_kv_collect_func: vllm_omni.model_executor.stage_input_processors.bagel.collect_cfg_kv_caches
    runtime:
      devices: "0"
      max_batch_size: 1
    engine_args:
      model_stage: dit
      gpu_memory_utilization: 0.45
      enforce_eager: true
      trust_remote_code: true
      engine_output_type: image
      distributed_executor_backend: "mp"
      enable_prefix_caching: false
      max_num_batched_tokens: 32768
      tensor_parallel_size: 1
      omni_kv_config:
        need_recv_cache: true
    engine_input_source: [0]
    final_output: true
    final_output_type: image
    is_comprehension: false
    default_sampling_params:
      seed: 52
    input_connectors:
      from_stage_0: rdma_connector

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1

  connectors:
    rdma_connector:
      name: MooncakeTransferEngineConnector
      extra:
        # role/sender_host/sender_zmq_port are resolved by orchestration.
        host: "auto"
        zmq_port: 50051
        protocol: "rdma"
        device_name: ""
        memory_pool_size: 2147483648
        memory_pool_device: "cpu"

  edges:
    - from: 0
      to: 1
      window_size: -1
